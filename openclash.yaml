# ================= 全局设置 (保持原样) =================
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
allow-lan: true
bind-address: "*"
mode: rule
ipv6: true
unified-delay: true
tcp-concurrent: true
log-level: warning
find-process-mode: 'off'
# interface-name: veth-mihomo
client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
disable-keep-alive: false

# 配置文件持久化设置
profile:
  store-selected: true
  store-fake-ip: true

# ================= 控制面板 (修正路径) =================
external-controller: 0.0.0.0:9090
secret: ""
external-ui: "ui" 

# ================= 机场订阅 (修正语法) =================
proxy-providers:
  Airport1:
    url: "https://xxx"
    type: http
    interval: 86400
    path: ./providers/Airport1.yaml 
    proxy: 直连 
    health-check:
      enable: true
      url: http://cp.cloudflare.com/generate_204
      interval: 300
    override:
      # 强制将所有下载的节点 packet-encoding 设为空，解决 xudp 导致的无延迟问题
      packet-encoding: ""
      client-fingerprint: "chrome"
# ================= 节点信息 (保持原样) =================
proxies:
  - {name: 直连, type: direct, udp: true}
# ================= 嗅探 (保持原样) =================
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.v2ex.com"
  skip-domain:
    - "rule-set:private_domain,cn_domain"
    - "+.goofish.com"
    - "dlg.io.mi.com"
    - "+.push.apple.com"
    - "+.apple.com"
    - "+.wechat.com"
    - "+.qpic.cn"
    - "+.qq.com"
    - "+.wechatapp.com"
    - "+.vivox.com"
    - "+.oray.com"
    - "+.sunlogin.net"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.wql.us"
    - "+.keywordsstudios.cn"

# ================= 入站 Tun (保持原样) =================
tun:
  enable: true
  stack: mixed
  device: tun0
  dns-hijack: 
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: false
  auto-detect-interface: true
  mtu: 1380

# ================= DNS模块 (注入优化) =================
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16 # 建议改为标准 198.18 段，原 28.0.0.1 可能会冲突
  fake-ip-filter-mode: blacklist
  
  # 【优化】让国内域名不过 Fake-IP，直接返回真实 IP，配合直连规则
  fake-ip-filter:
    - "rule-set:private_domain,cn_domain"
    - "*.lan"
    - "*.local"
    - "+.services.googleapis.cn"
    - "+.xn--ngstr-lra8j.com"
    - "time.*.com"
    - "+.pool.ntp.org"
    - "+.ntp.tencent.com"
    - "+.ntp1.aliyun.com"
    - "+.ntp.ntsc.ac.cn"
    - "+.cn.ntp.org.cn"
    - "*.microsoftonline.com"
    - "*.wql.us"
    - "*.microsoft.com"
    - "*.keywordsstudios.cn"
    - "geosite:cn" # 额外增加 geosite 库的国内域名

  # 【新增】DNS 分流策略：国内域名强制用国内 DNS 解析
  nameserver-policy:
    "geosite:cn,private":
    - https://223.5.5.5/dns-query
    - https://1.12.12.12/dns-query
    "rule-set:cn_domain":
    - https://223.5.5.5/dns-query
    - https://1.12.12.12/dns-query
  default-nameserver:
    - 223.5.5.5
    - 1.12.12.12
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://1.12.12.12/dns-query
  nameserver:
    - https://8.8.8.8/dns-query
    - https://1.1.1.1/dns-query
  fallback:
    - https://8.8.8.8/dns-query
    - https://1.1.1.1/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
        - 240.0.0.0/4

# ================= 出站策略 (保持原样) =================
pr: &pr {type: select, proxies: [♻️ 自动选择, ♻️ 香港自动, ♻️ 日本自动, ♻️ 美国自动, ♻️ 台湾自动, ♻️ 新加坡自动, 🌐 手动选择,  直连]}

proxy-groups:
  - {name: 🚀 默认代理, <<: *pr, default: ♻️ 自动选择}
  - {name: ✈️ MyUrl, <<: *pr, default: ♻️ 自动选择}
  - {name: 🍀 Google-Work, <<: *pr, default: ♻️ 自动选择}
  - {name: 📹 YouTube, <<: *pr, default: ♻️ 自动选择}
  - {name: 🎵 TikTok, <<: *pr, default: ♻️ 美国自动}
  - {name: 🎥 NETFLIX, <<: *pr, default: ♻️ 新加坡自动}
  - {name: 🐬 OneDrive, <<: *pr, default: ♻️ xsus}
  - {name: 🚀 Oversea-Game, <<: *pr, default: 直连}
  - {name: 🎯 直连, type: select, proxies: [直连, 🚀 默认代理]}
  - {name: 🚫 AD-BLOCK, type: select, proxies: [REJECT, DIRECT]}
  - {name: 🐟 漏网之鱼, <<: *pr, default: 🚀 默认代理}
  - {name: 🌐 手动选择, type: select, include-all: true, use: [Airport1]}
  - {name: ♻️ 香港自动, type: url-test, use: [Airport1], include-all: true, tolerance: 50, interval: 150, url: "http://cp.cloudflare.com/generate_204", filter: "(?=.*(hk|港|HK|(?i)Hong))^((?!(台|日|韩|新|深|美|a1|aws|acck|cc|rn|ak|xueshan)).)*$"}
  - {name: ♻️ 日本自动, type: url-test, use: [Airport1], include-all: true, tolerance: 50, interval: 150, url: "http://cp.cloudflare.com/generate_204", filter: "(?=.*(jp|日|JP|(?i)Japan))^((?!(港|台|韩|新|美|尼|a1|aws|acck|cc|rn|ak|xueshan)).)*$"}
  - {name: ♻️ 台湾自动, type: url-test, use: [Airport1], include-all: true, tolerance: 50, interval: 150, url: "http://cp.cloudflare.com/generate_204", filter: "(?=.*(tw|台|TW|(?i)Taiwan))^((?!(港|日|韩|新|美|a1|aws|acck|cc|rn|ak|lxueshan)).)*$"}
  - {name: ♻️ 新加坡自动, type: url-test, use: [Airport1], include-all: true, tolerance: 50, interval: 150, url: "http://cp.cloudflare.com/generate_204", filter: "(?=.*(sg|狮城|新|SG|(?i)Singapore))^((?!(港|台|日|韩|美|a1|aws|acck|cc|rn|ak|xueshan)).)*$"}
  - {name: ♻️ 美国自动, type: url-test, use: [Airport1], include-all: true, tolerance: 50, interval: 150, url: "http://cp.cloudflare.com/generate_204", filter: "(?=.*(美|US|us|(?i)States|America))^((?!(港|台|日|韩|新|Aus|AUS|澳|au|a1|aws|acck|ak|xueshan)).)*$"}
  - {name: ♻️ 自动选择, type: url-test, use: [Airport1], include-all: true, tolerance: 50, interval: 150, url: "http://cp.cloudflare.com/generate_204", filter: "^((?!(直连|home|a1|aws|acck|cc|rn|ak|xueshan)).)*$"}

